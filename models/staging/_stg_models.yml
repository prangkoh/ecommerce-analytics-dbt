version: 2

models:
  - name: stg_orders
    description: "Cleaned orders data — one row per order"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']

  - name: stg_customers
    description: "Cleaned customer master data"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_lineitems
    description: "Cleaned line items — most granular sales data"
    columns:
      - name: order_id
        tests:
          - not_null
      - name: line_number
        tests:
          - not_null

  - name: stg_suppliers
    description: "Cleaned supplier master data"
    columns:
      - name: supplier_id
        tests:
          - unique
          - not_null

  - name: stg_nations
    description: "Nation reference data"
    columns:
      - name: nation_id
        tests:
          - unique
          - not_null

  - name: stg_regions
    description: "Region reference data"
    columns:
      - name: region_id
        tests:
          - unique
          - not_null